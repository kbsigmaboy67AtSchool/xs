<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XS Steg</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="app">

<h1>XS Steg</h1>

<textarea id="cover" placeholder="Cover text"></textarea>

<textarea id="textInput" placeholder="Optional text input"></textarea>

<input type="file" id="file">

<input type="password" id="password" placeholder="Password">

<div class="buttons">
<button id="encode">Encode</button>
<button id="decode">Decode</button>
<button id="exportOutput">Export Output</button>
<button id="importOutput">Import Encoded File</button>
</div>

<input type="file" id="importFile" style="display:none">

<div id="loading">Processing…</div>

<div class="progressContainer">
<div id="progressBar"></div>
</div>

<textarea id="output" placeholder="Result"></textarea>

<a id="download"></a>

</div>

<script src="/script.js"></script>

</body>
</html>
